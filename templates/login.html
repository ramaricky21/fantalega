<!DOCTYPE html>
<html>
<head>
    <title>Login - Fantalega</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;

            background: 
                linear-gradient(rgba(2,6,23,0.85), rgba(2,6,23,0.85)),
                url("/static/img/curva_sud.jpg") no-repeat center center fixed;

            background-size: cover;

            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .login-box {
            background: rgba(17,24,39,0.92);
            padding: 30px;
            border-radius: 16px;
            width: 320px;
            text-align: center;
        }

        input, button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: none;
            box-sizing: border-box;
        }

        input {
            background: #1f2937;
            color: white;
        }

        button {
            background: #38bdf8;
            font-weight: bold;
            cursor: pointer;
        }

        a {
            color: #38bdf8;
            display: block;
            margin-top: 10px;
            text-decoration: none;
        }

        input::placeholder {
            color: #cbd5e1;
        }
    </style>
</head>

<body>

<div class="login-box">

    <h2>⚽ Fantalega</h2>

    <form method="post">
        <input name="username" placeholder="Username" required>
        <input name="password" type="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <a href="/register">📝 Registrati</a>
    <a href="/recover">🔁 Password dimenticata?</a>

</div>

</body>
</html>
